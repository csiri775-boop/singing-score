<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monitor</title>

<style>
body{
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

h1{
  font-size:50px;
  margin:20px;
}

table{
  width:80%;
  margin:auto;
  border-collapse:collapse;
  font-size:28px;
}

td,th{
  border:1px solid white;
  padding:10px;
}

.gold{
  background:gold;
  color:black;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>🏆 ตารางคะแนน</h1>

<table>
<thead>
<tr>
<th>อันดับ</th>
<th>ชื่อ</th>
<th>คะแนน</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "...",
  projectId: "singing-contest-85f70"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

onSnapshot(collection(db,"contestants"), snap => {

  let list = [];

  snap.forEach(doc=>{
    const d = doc.data();

    list.push({
      name: d.name,
      score: d.totalScore || 0
    });
  });

  // 🔥 เรียงคะแนนมากไปน้อย
  list.sort((a,b)=>b.score - a.score);

  let html="";

  list.forEach((c,i)=>{
    html+=`
    <tr class="${i==0?'gold':''}">
      <td>${i+1}</td>
      <td>${c.name}</td>
      <td>${c.score}</td>
    </tr>
    `;
  });

  document.getElementById("tb").innerHTML = html;

});

</script>

</body>
</html>
