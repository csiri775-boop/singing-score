<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monitor คะแนน</title>

<style>
body {
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

h1 {
  font-size: 40px;
}

table {
  width: 90%;
  margin: auto;
  border-collapse: collapse;
  font-size: 28px;
}

td, th {
  padding: 15px;
}

tr:nth-child(2) {
  background: gold;
  color: black;
  font-size: 36px;
}

tr:nth-child(3) {
  background: silver;
  color: black;
}

tr:nth-child(4) {
  background: #cd7f32;
}

</style>
</head>

<body>

<h1>🏆 ตารางคะแนน</h1>

<table id="table"></table>

<script>
const API = "https://script.google.com/macros/s/AKfycbxxxx/exec";

async function loadData() {
  const res = await fetch(API);
  const data = await res.json();

  let html = "<tr><th>อันดับ</th><th>ชื่อ</th><th>คะแนน</th></tr>";

  data.forEach((item, i) => {
    html += `
      <tr>
        <td>${i+1}</td>
        <td>${item.name}</td>
        <td>${item.score}</td>
      </tr>
    `;
  });

  document.getElementById("table").innerHTML = html;
}

setInterval(loadData, 3000);
loadData();

// 🔥 Fullscreen
document.documentElement.requestFullscreen();
</script>

</body>
</html>
