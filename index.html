<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ระบบให้คะแนนร้องเพลง</title>

<style>
body{font-family:sans-serif;margin:0;padding:10px;background:#f5f5f5;}
#mainTitle{text-align:center;font-size:32px;margin:10px;}
input{width:60px;padding:5px;margin:2px;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{border:1px solid #000;padding:5px;text-align:center;}
button{margin:5px;padding:6px 12px;background:#4CAF50;color:white;border:none;border-radius:6px;}
.gold{background:gold;font-weight:bold;}

#loginWrapper{display:flex;justify-content:center;align-items:center;height:100vh;}
#loginWrapper.hidden{display:none;}
#loginBox{background:white;padding:30px;border-radius:10px;}
</style>
</head>

<body>

<h1 id="mainTitle">🎤 ระบบให้คะแนนประกวดร้องเพลง</h1>

<!-- LOGIN -->
<div id="loginWrapper">
  <div id="loginBox">
    <h2>🔐 Login</h2>
    <input id="user" placeholder="Username"><br><br>
    <input id="pass" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="appBox" style="display:none;">

<h2>ระบบให้คะแนน</h2>

<select id="contestant" style="width:400px;height:40px;"></select>

<br><br>

<div id="formArea"></div>

<button onclick="submitScore()">💾 บันทึก</button>
<button onclick="clearScore()">🧹 ล้าง</button>
<button onclick="openMonitor()">📺 Monitor</button>

<hr>

<h2>🏆 ตารางคะแนน</h2>
<table>
<thead>
<tr><th>อันดับ</th><th>ชื่อ</th><th>คะแนน</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<!-- 🔥 Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "...",
  projectId: "singing-contest-85f70"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cache=[];

/* LOGIN */
window.login=function(){
  if(user.value==="admin" && pass.value==="admin1"){
    loginWrapper.classList.add("hidden");
    appBox.style.display="block";
  }else alert("❌ ผิด");
};

/* FORM คะแนน */
const items=[
{name:"น้ำเสียง",max:30},
{name:"เทคนิค",max:10},
{name:"จังหวะ",max:20},
{name:"อักขระ",max:10},
{name:"บุคลิก",max:10},
{name:"ความยาก",max:10},
{name:"แต่งกาย",max:10}
];

function createForm(){
let html="";
for(let j=1;j<=3;j++){
html+=`<h3>กรรมการ ${j}</h3><table><tr>`;
items.forEach(i=>html+=`<th>${i.name}(${i.max})</th>`);
html+=`</tr><tr>`;
items.forEach((i,idx)=>{
html+=`<td><input type="number" id="j${j}_s${idx}"></td>`;
});
html+=`</tr></table><br>`;
}
formArea.innerHTML=html;
}
createForm();

/* คำนวณ */
function calc(p){
let sum=0;
for(let i=0;i<items.length;i++){
let v=Number(document.getElementById(`${p}_s${i}`).value)||0;
if(v>items[i].max){alert("เกิน");throw "err";}
sum+=v;
}
return sum;
}

/* SAVE */
window.submitScore=async()=>{
let id=contestant.value;
let total=calc("j1")+calc("j2")+calc("j3");

await updateDoc(doc(db,"contestants",id),{
totalScore:total
});

alert("บันทึกแล้ว");
};

/* CLEAR */
window.clearScore=()=>{
document.querySelectorAll("input").forEach(i=>i.value="");
};

/* LOAD + TABLE */
onSnapshot(collection(db,"contestants"),snap=>{
let list=[];
snap.forEach(d=>{
let data=d.data();
list.push({
id:d.id,
name:data.name,
score:data.totalScore||0
});
});

list.sort((a,b)=>b.score-a.score);

contestant.innerHTML="";
list.forEach(i=>{
let o=document.createElement("option");
o.value=i.id;
o.text=i.name;
contestant.appendChild(o);
});

let html="";
list.forEach((c,i)=>{
html+=`
<tr class="${i==0?'gold':''}">
<td>${i+1}</td>
<td>${c.name}</td>
<td>${c.score}</td>
</tr>`;
});
table.innerHTML=html;

});

</script>

<script>
function openMonitor(){
  window.open("monitor.html","_blank");
}
</script>

</body>
</html>
